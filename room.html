<!DOCTYPE html>
<html>
<head>
    <title>Group Video Chat</title>
    <style>
        html {
            background-color: #222;
        }
        #video-container {
            display: flex;       /* This turns on the flexible layout */
            flex-wrap: wrap;    /* This allows videos to wrap to the next row ONLY when space runs out */
            flex-direction: row; /* This forces them to fill left-to-right first */
            
            justify-content: center; /* Centers the videos horizontally */
            align-content: center;   /* Centers the videos vertically */
            
            width: 100vw;
            height: 100vh;
            background-color: #000;
            margin: 0;
            overflow: hidden;
        }

        .video-player {
            /* Ensure there are no margins pushing elements away */
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
            position: relative;
            background-color: #1a1a1a;
            border: 1px solid #333; /* Optional: adds a small gap between videos */
        }   
        #action-menu {
            position: fixed;
            bottom: 20px; /* Distance from the bottom */
            left: 50%;
            transform: translateX(-50%); /* Offsets the width so the CENTER of the menu is at 50% */
            
            /* Your existing styles */
            background: #383838;
            width: 400px;
            height: 50px;
            display: flex;
            border-radius: 8px; 
            z-index: 1000; /* Makes sure it stays on top of video feeds */
        }
        .button {
            background-color: red;
            height: 40px;
            width: 50px;
            border-radius: 8px;
            margin-left: 5px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <div id="local-player" class="video-player"></div>
    </div>
    <div id="action-menu">
        <button id="mic-btn" class="button">Mute Mic</button>
        <button id="video-btn" class="button">Stop Video</button>
    </div>


</body>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
<script src="script.js"></script>
</html>
