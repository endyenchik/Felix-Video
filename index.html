<!DOCTYPE html>
<html>
<head>
    <style>
        html {
            background-color: #222;
            font-family: Sans-serif
        }
        
        #menu {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%); 
            
            background: #383838;
            width: 300px;  /* Narrower width looks better for vertical menus */
            height: auto;  /* Let the height grow based on content */
            padding: 20px;
            display: flex;
            
            /* THE FIX: Switch from row to column */
            flex-direction: column; 
            
            /* Space between the input and the button */
            gap: 15px; 
            
            border-radius: 8px; 
            z-index: 1000;
            color: white;
        }

        #menu input {
            width: 100%; /* Make them fill the full width of the menu */
            height: 40px;
            border-radius: 4px;
            border: none;
            padding: 5px;
            box-sizing: border-box; /* Ensures padding doesn't break the width */
        }
        #proceedButton {
            background-color: blue
        }

    </style>
</head>
<body>
    <div id="menu">
        <h2>Enter the rooms ID:</h2>
        <input type="text" id="roomSelector" placeholder="Enter the id">
        <input type="submit" id="proceedButton" value="Join Call" onclick="proceed()">
    </div>
</body>
<script>
    
    function proceed() {
        let id = document.getElementById("roomSelector").value
        console.log(id)
        localStorage.setItem('id',id)

        window.location.href = "room.html"
    }
</script>

</html>
